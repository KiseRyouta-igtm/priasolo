<!DOCTYPE html>
<html>
<head>
    <title>Tambah Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Tambah Data Penerima</h2>

<form method="POST">
    <input type="text" name="nama" placeholder="Nama" class="form-control mb-2" required>
    <input type="text" name="nik" placeholder="NIK" class="form-control mb-2" required>
    <input type="text" name="alamat" placeholder="Alamat" class="form-control mb-2" required>

    <select name="jenis" class="form-control mb-2">
        <option>BLT</option>
        <option>Sembako</option>
        <option>PKH</option>
    </select>

    <button class="btn btn-primary">Simpan</button>
</form>

</body>
</html>
